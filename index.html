<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 font-sans text-white">
    <!-- Language Toggle & Install Button -->
    <div class="fixed top-4 left-4 z-50 flex flex-col gap-2">
        <button id="langToggle" class="glass px-4 py-2 rounded-full font-medium text-sm hover:scale-105 transition-transform">
            English
        </button>
        <button id="installBtn" class="hidden glass px-4 py-2 rounded-full font-medium text-sm hover:scale-105 transition-transform bg-gradient-to-r from-cyan-500 to-blue-600 text-white" title="تثبيت التطبيق">
            <span class="flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span data-i18n="installBtn">تثبيت</span>
            </span>
        </button>
    </div>

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-10">
            <div class="glass rounded-3xl p-8 mb-6">
                <img src="img/logo.svg" alt="ADSL/VDSL Calculator Logo" class="w-20 h-20 mx-auto mb-4">
                <h1 class="text-3xl md:text-4xl font-bold mb-3 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent" data-i18n="pageTitle">
                    حاسبة سرعة خط ADSL/VDSL
                </h1>
                <p class="text-gray-300 text-lg" data-i18n="subtitle">
                    هل يتحمل خطك رفع السرعة؟ أدخل قيم المودم لتحليل جودة الخط
                </p>
            </div>
        </header>

        <!-- Main Form -->
        <main class="glass rounded-3xl p-6 md:p-8 mb-6">
            <!-- Line Type Selector -->
            <div class="mb-8">
                <label class="block text-lg font-semibold mb-4 text-cyan-400" data-i18n="lineType">
                    نوع الخط
                </label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="lineType" value="adsl" class="peer sr-only" checked>
                        <div class="border-2 border-gray-600 rounded-xl p-4 text-center peer-checked:border-cyan-400 peer-checked:bg-cyan-400/20 transition-all hover:border-gray-500">
                            <div class="font-semibold text-lg">ADSL / ADSL2+</div>
                            <div class="text-sm text-gray-400 mt-1">Asymmetric Digital Subscriber Line</div>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="lineType" value="vdsl" class="peer sr-only">
                        <div class="border-2 border-gray-600 rounded-xl p-4 text-center peer-checked:border-cyan-400 peer-checked:bg-cyan-400/20 transition-all hover:border-gray-500">
                            <div class="font-semibold text-lg">VDSL / VDSL2</div>
                            <div class="text-sm text-gray-400 mt-1">Very-high-bit-rate DSL</div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Input Grid -->
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Downstream Section -->
                <div class="space-y-5">
                    <h2 class="text-xl font-bold text-cyan-400 flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                        </svg>
                        <span data-i18n="downstream">Downstream (التحميل)</span>
                    </h2>
                    
                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="currentRate">
                            Current Rate (kbps) - السرعة الحالية
                        </label>
                        <input type="number" id="dsCurrentRate" class="input-field" placeholder="مثال: 8000" min="0">
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="maxRate">
                            Max Rate (kbps) - أقصى سرعة ممكنة
                        </label>
                        <input type="number" id="dsMaxRate" class="input-field" placeholder="مثال: 12000" min="0">
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="snrMargin">
                            SNR Margin (dB) - هامش نسبة الإشارة
                        </label>
                        <input type="number" id="dsSnr" class="input-field" placeholder="مثال: 12.5" step="0.1">
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="lineAttenuation">
                            Line Attenuation (dB) - توهين الخط
                        </label>
                        <input type="number" id="dsAtten" class="input-field" placeholder="مثال: 25.0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="errors">
                            Errors (CRC) - عدد الأخطاء
                        </label>
                        <input type="number" id="dsErrors" class="input-field" placeholder="مثال: 0" min="0">
                    </div>
                </div>

                <!-- Upstream Section -->
                <div class="space-y-5">
                    <h2 class="text-xl font-bold text-cyan-400 flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
                        </svg>
                        <span data-i18n="upstream">Upstream (الرفع)</span>
                    </h2>
                    
                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="currentRate">
                            Current Rate (kbps) - السرعة الحالية
                        </label>
                        <input type="number" id="usCurrentRate" class="input-field" placeholder="مثال: 1024" min="0">
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="maxRate">
                            Max Rate (kbps) - أقصى سرعة ممكنة
                        </label>
                        <input type="number" id="usMaxRate" class="input-field" placeholder="مثال: 2048" min="0">
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="snrMargin">
                            SNR Margin (dB) - هامش نسبة الإشارة
                        </label>
                        <input type="number" id="usSnr" class="input-field" placeholder="مثال: 8.0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="lineAttenuation">
                            Line Attenuation (dB) - توهين الخط
                        </label>
                        <input type="number" id="usAtten" class="input-field" placeholder="مثال: 15.0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label class="block text-sm font-medium mb-2 text-gray-300" data-i18n="errors">
                            Errors (CRC) - عدد الأخطاء
                        </label>
                        <input type="number" id="usErrors" class="input-field" placeholder="مثال: 0" min="0">
                    </div>
                </div>
            </div>

            <!-- Calculate Button -->
            <button id="calculateBtn" class="w-full mt-8 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-4 px-8 rounded-xl text-lg transition-all hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-cyan-500/25" data-i18n="calculateBtn">
                تحليل الخط و التوصية
            </button>
        </main>

        <!-- Notification -->
        <div id="notification" class="hidden glass rounded-xl p-4 mb-6 text-center border-2 border-red-500/50 bg-red-500/10">
            <p id="notificationText" class="text-red-400 font-medium"></p>
        </div>

        <!-- Results Section -->
        <section id="results" class="hidden">
            <!-- Overall Verdict -->
            <div class="glass rounded-3xl p-6 md:p-8 mb-6">
                <h2 class="text-2xl font-bold mb-6 text-center" data-i18n="analysisResult">نتيجة التحليل</h2>
                <div id="verdictCard" class="rounded-2xl p-6 text-center mb-6">
                    <div id="verdictIcon" class="text-6xl mb-4"></div>
                    <h3 id="verdictTitle" class="text-2xl font-bold mb-2"></h3>
                    <p id="verdictMessage" class="text-lg"></p>
                </div>
                
                <!-- Metrics Grid -->
                <div id="metricsGrid" class="grid md:grid-cols-2 gap-4">
                    <!-- Metrics will be inserted here by JS -->
                </div>
            </div>

            <!-- Recommendations -->
            <div class="glass rounded-3xl p-6 md:p-8">
                <h3 class="text-xl font-bold mb-4 text-cyan-400" data-i18n="recommendations">التوصيات</h3>
                <ul id="recommendationsList" class="space-y-3">
                    <!-- Recommendations will be inserted here -->
                </ul>
            </div>
        </section>

        <!-- Footer -->
        <footer class="glass rounded-3xl p-6 border-t border-gray-700/50 mt-10">
            <!-- Visitor Counter -->
            <div class="flex justify-center gap-6 mb-4 text-sm visitor-counter">
                <div class="flex items-center gap-2">
                    <span class="font-semibold text-gray-300" data-i18n="totalVisitors">إجمالي الزوار</span>:
                    <span id="totalVisitors" class="font-mono text-cyan-400">...</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="font-semibold text-gray-300" data-i18n="todayVisitors">زوار اليوم</span>:
                    <span id="todayVisitors" class="font-mono text-cyan-400">...</span>
                </div>
            </div>

            <!-- Copyright -->
            <p class="text-center text-sm text-gray-400 mb-2">
                <span data-i18n="developedBy">تم التطوير بـ ❤️ بواسطة ALBEK</span> | <span data-i18n="copyright">جميع الحقوق محفوظة ©</span> <span id="currentYear"></span>
            </p>

            <!-- Contact Note -->
            <p class="text-center text-sm text-gray-400">
                <span data-i18n="contactNote">للملاحظات أو الأخطاء يرجى التواصل معنا:</span> <a href="mailto:INFO@ALBEK.CC" class="text-cyan-400 hover:text-cyan-300 transition-colors">INFO@ALBEK.CC</a>
            </p>
        </footer>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }

        // PWA Install Button Logic
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.classList.add('hidden');
            }
            deferredPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            installBtn.classList.add('hidden');
            deferredPrompt = null;
        });
    </script>
