<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#22d3ee" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#22d3ee" opacity="0.03"/>
  <circle cx="1100" cy="530" r="250" fill="#3b82f6" opacity="0.03"/>
  <!-- Logo (centered) -->
  <g transform="translate(540, 80) scale(1.2)">
    <rect x="0" y="0" width="100" height="60" rx="10" fill="url(#cyan)" opacity="0.9"/>
    <circle cx="20" cy="30" r="6" fill="#0f172a"/>
    <circle cx="50" cy="30" r="6" fill="#0f172a"/>
    <circle cx="80" cy="30" r="6" fill="#0f172a"/>
    <line x1="50" y1="0" x2="50" y2="-30" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="50" cy="-35" r="8" fill="#22d3ee"/>
  </g>
  <!-- Title Arabic -->
  <text x="600" y="260" text-anchor="middle" font-family="Noto Sans Arabic, sans-serif" font-size="52" font-weight="700" fill="url(#text-grad)">حاسبة سرعة خط ADSL/VDSL</text>
  <!-- Title English -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="white" opacity="0.9">ADSL/VDSL Line Speed Calculator</text>
  <!-- Divider -->
  <line x1="400" y1="370" x2="800" y2="370" stroke="url(#cyan)" stroke-width="2" opacity="0.5"/>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" fill="#94a3b8">Analyze your line quality • Determine speed upgrade potential</text>
  <!-- Feature tags -->
  <g transform="translate(250, 470)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#22d3ee">ADSL / ADSL2+</text>
  </g>
  <g transform="translate(440, 470)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#22d3ee">VDSL / VDSL2</text>
  </g>
  <g transform="translate(630, 470)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#22d3ee">AR / EN</text>
  </g>
  <g transform="translate(820, 470)">
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#22d3ee">Mobile Ready</text>
  </g>
  <!-- Footer -->
  <text x="600" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#64748b">Developed with ❤️ by ALBEK</text>
</svg>
