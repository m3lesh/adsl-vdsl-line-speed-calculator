<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="url(#cyan)" stroke-width="3"/>
  <!-- Signal waves (upstream) -->
  <path d="M50 130 Q70 110 90 130" stroke="url(#cyan)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M40 145 Q70 115 100 145" stroke="url(#cyan)" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M30 160 Q70 120 110 160" stroke="url(#cyan)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Signal waves (downstream) -->
  <path d="M110 130 Q130 110 150 130" stroke="url(#cyan)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M100 145 Q130 115 160 145" stroke="url(#cyan)" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M90 160 Q130 120 170 160" stroke="url(#cyan)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Modem/router icon -->
  <rect x="75" y="70" width="50" height="35" rx="6" fill="url(#cyan)" opacity="0.9"/>
  <circle cx="87" cy="87" r="3" fill="#0f172a"/>
  <circle cx="100" cy="87" r="3" fill="#0f172a"/>
  <circle cx="113" cy="87" r="3" fill="#0f172a"/>
  <!-- Antenna -->
  <line x1="100" y1="70" x2="100" y2="50" stroke="url(#cyan)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="46" r="5" fill="url(#cyan)"/>
  <!-- Speed indicator arrow -->
  <path d="M85 55 L100 40 L115 55" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
